name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      DEVICE_ID:
        description: 设备ID (Device ID)
        required: true
        default: xg-040g-md
      REPO_URL:
        description: ImmortalWrt仓库地址
        required: true
        default: https://github.com/immortalwrt/immortalwrt.git
      BRANCH:
        description: ImmortalWrt分支
        required: true
        default: master
      CONFIG_FILE:
        description: 配置文件路径
        required: false
        default: .config
      FEEDS_CONF:
        description: feeds.conf路径
        required: false
        default: feeds.conf.default
      ENABLE_CCACHE:
        description: 启用ccache加速编译
        required: false
        default: "true"
      EXTRA_PACKAGES:
        description: 额外安装的软件包
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo apt-get clean

      - name: Clone ImmortalWrt source
        run: |
          for i in 1 2 3; do
            git clone --depth 1 ${{ github.event.inputs.REPO_URL }} -b ${{ github.event.inputs.BRANCH }} openwrt && break
            if [ $i -eq 3 ]; then
              echo "::error::源码克隆失败，已重试3次"
              exit 1
            fi
            echo "::warning::源码克隆失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Load custom feeds
        run: |
          if [ -f ${{ github.event.inputs.FEEDS_CONF }} ]; then
            cp -f ${{ github.event.inputs.FEEDS_CONF }} openwrt/feeds.conf.default
          fi

      - name: Update feeds
        run: |
          cd openwrt
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            if [ $i -eq 3 ]; then
              echo "::error::Feeds更新失败，已重试3次"
              exit 1
            fi
            echo "::warning::Feeds更新失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Install feeds
        run: |
          cd openwrt
          for i in 1 2 3; do
            ./scripts/feeds install -a && break
            if [ $i -eq 3 ]; then
              echo "::error::Feeds安装失败，已重试3次"
              exit 1
            fi
            echo "::warning::Feeds安装失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Load custom configuration
        run: |
          cd openwrt
          if [ -f ../${{ github.event.inputs.CONFIG_FILE }} ]; then
            cp -f ../${{ github.event.inputs.CONFIG_FILE }} .config
          fi
          make defconfig

      - name: Copy custom files
        run: |
          if [ -d files ]; then
            cp -rf files openwrt/
            echo "已复制自定义文件到固件目录"
          fi

      - name: Get version information
        id: versions
        run: |
          cd openwrt
          IMMORTALWRT_VER=$(cat version 2>/dev/null || echo "snapshot")
          KERNEL_VER=$(grep -E "^LINUX_VERSION-\d+\.\d+" include/kernel-*.mk | head -n1 | cut -d'=' -f2 | tr -d ' ')
          if [ -z "$KERNEL_VER" ]; then
            KERNEL_VER=$(make kernelversion 2>/dev/null || echo "unknown")
          fi
          echo "IMMORTALWRT_VER=$IMMORTALWRT_VER" >> $GITHUB_OUTPUT
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_OUTPUT
          echo "版本信息: ImmortalWrt $IMMORTALWRT_VER, Kernel $KERNEL_VER"

      - name: Enable ccache
        if: ${{ github.event.inputs.ENABLE_CCACHE == 'true' }}
        run: |
          cd openwrt
          echo "CONFIG_CCACHE=y" >> .config
          echo "CONFIG_CCACHE_DIR=\"$HOME/.ccache\"" >> .config
          ccache -M 20G
          make defconfig

      - name: Install extra packages
        if: ${{ github.event.inputs.EXTRA_PACKAGES != '' }}
        run: |
          cd openwrt
          for pkg in ${{ github.event.inputs.EXTRA_PACKAGES }}; do
            ./scripts/feeds install $pkg
            echo "CONFIG_PACKAGE_$pkg=y" >> .config
          done
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          for i in 1 2 3; do
            make download -j$(nproc) V=s && break
            if [ $i -eq 3 ]; then
              echo "::error::软件包下载失败，已重试3次"
              exit 1
            fi
            echo "::warning::软件包下载失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Compile firmware
        run: |
          cd openwrt
          echo "开始编译，详细日志已开启"
          make -j$(nproc) V=s || {
            echo "::error::编译失败，尝试单线程重编"
            make -j1 V=s
            exit $?
          }

      - name: Organize output files
        run: |
          cd openwrt
          mkdir -p ../output/firmware
          OUTPUT_DIR="bin/targets/*/*"
          if [ -d $OUTPUT_DIR ]; then
            cp -f $OUTPUT_DIR/*-factory.bin ../output/firmware/ 2>/dev/null || true
            cp -f $OUTPUT_DIR/*-sysupgrade.bin ../output/firmware/ 2>/dev/null || true
            cp -f $OUTPUT_DIR/*-rootfs.tar.gz ../output/firmware/ 2>/dev/null || true
            cp -f $OUTPUT_DIR/sha256sums ../output/firmware/ 2>/dev/null || true
            cp -f $OUTPUT_DIR/config.buildinfo ../output/firmware/ 2>/dev/null || true
            cp -f $OUTPUT_DIR/feeds.buildinfo ../output/firmware/ 2>/dev/null || true
            cp -f $OUTPUT_DIR/version.buildinfo ../output/firmware/ 2>/dev/null || true
          fi
          echo "固件文件已整理到output目录"
          ls -lh ../output/firmware/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ steps.versions.outputs.IMMORTALWRT_VER }}-${{ github.event.inputs.DEVICE_ID }}-kernel-${{ steps.versions.outputs.KERNEL_VER }}
          path: output/firmware/*
          retention-days: 7
          compression-level: 6
