---
name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      DEVICE_ID:
        description: 设备ID (Device ID)
        required: true
        default: xg-040g-md
      REPO_URL:
        description: ImmortalWrt仓库地址
        required: true
        default: https://github.com/immortalwrt/immortalwrt.git
      BRANCH:
        description: ImmortalWrt分支
        required: true
        default: master
      CONFIG_FILE:
        description: 配置文件路径
        required: false
        default: .config
      FEEDS_CONF:
        description: feeds.conf路径
        required: false
        default: feeds.conf.default
      ENABLE_CCACHE:
        description: 启用ccache加速编译
        required: false
        default: "true"
      EXTRA_PACKAGES:
        description: 额外安装的软件包
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Setup swap space
        run: |
          echo "创建2G swap分区，防止编译OOM..."
          sudo fallocate -l 2G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          sudo sysctl vm.swappiness=10
          echo "swap配置完成，swappiness=10"
          free -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint \
            binutils bison build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool jq \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev \
            libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
            libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip \
            p7zip-full patch pkgconf python3 python3-pyelftools \
            python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo apt-get clean

      - name: Clone ImmortalWrt source
        run: |
          for i in 1 2 3; do
            # 每次克隆前清理不完整目录，避免目录已存在导致克隆失败
            rm -rf openwrt
            git clone --depth 1 ${{ github.event.inputs.REPO_URL }} \
              -b ${{ github.event.inputs.BRANCH }} openwrt && break
            if [ $i -eq 3 ]; then
              echo "::error::源码克隆失败，已重试3次"
              exit 1
            fi
            echo "::warning::源码克隆失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/ccache
          key: ${{ runner.os }}-immortalwrt-${{ github.event.inputs.BRANCH }}-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-immortalwrt-${{ github.event.inputs.BRANCH }}-

      - name: Setup large directory symlinks
        run: |
          cd openwrt
          echo "创建大目录软链接到/mnt分区，防止根分区空间不足..."
          sudo mkdir -p /mnt/openwrt-cache/{build_dir,staging_dir}
          sudo chown -R $USER:$USER /mnt/openwrt-cache
          # 删除原有空目录（如果存在）
          rm -rf build_dir staging_dir
          # 创建软链接，编译中间目录指向/mnt分区（不缓存）
          ln -s /mnt/openwrt-cache/build_dir build_dir
          ln -s /mnt/openwrt-cache/staging_dir staging_dir
          echo "软链接创建完成，编译中间目录已挂载到/mnt分区"
          ls -la dl ccache build_dir staging_dir

      - name: Load custom feeds
        run: |
          if [ -f ${{ github.event.inputs.FEEDS_CONF }} ]; then
            cp -f ${{ github.event.inputs.FEEDS_CONF }} openwrt/feeds.conf.default
          fi

      - name: Update feeds
        run: |
          cd openwrt
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            if [ $i -eq 3 ]; then
              echo "::error::Feeds更新失败，已重试3次"
              exit 1
            fi
            echo "::warning::Feeds更新失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Install feeds
        run: |
          cd openwrt
          for i in 1 2 3; do
            ./scripts/feeds install -a && break
            if [ $i -eq 3 ]; then
              echo "::error::Feeds安装失败，已重试3次"
              exit 1
            fi
            echo "::warning::Feeds安装失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Copy custom files
        run: |
          if [ -d files ]; then
            cp -rf files openwrt/
            echo "已复制自定义files目录到源码根目录，文件将打包进固件"
          fi

      - name: Run custom build script
        run: |
          cd openwrt/package
          echo "执行自定义脚本，工作目录：$(pwd)（插件将克隆到package目录）"
          chmod +x ../../scripts/custom.sh
          ../../scripts/custom.sh
          echo "自定义脚本执行完成，第三方插件已安装、CPUFreq补丁已应用"

      - name: Load custom configuration
        run: |
          cd openwrt
          if [ -f ../${{ github.event.inputs.CONFIG_FILE }} ]; then
            cp -f ../${{ github.event.inputs.CONFIG_FILE }} .config
          fi
          make defconfig

      - name: Get version information
        id: versions
        run: |
          cd openwrt
          IMMORTALWRT_VER=$(cat version 2>/dev/null || echo "snapshot")
          KERNEL_VER=$(grep -E "^LINUX_VERSION-\d+\.\d+" include/kernel-*.mk \
            | head -n1 | cut -d'=' -f2 | tr -d ' ')
          if [ -z "$KERNEL_VER" ]; then
            KERNEL_VER=$(make kernelversion 2>/dev/null || echo "unknown")
          fi
          echo "IMMORTALWRT_VER=$IMMORTALWRT_VER" >> $GITHUB_OUTPUT
          echo "KERNEL_VER=$KERNEL_VER" >> $GITHUB_OUTPUT
          echo "版本信息: ImmortalWrt $IMMORTALWRT_VER, Kernel $KERNEL_VER"

      - name: Enable ccache
        if: ${{ github.event.inputs.ENABLE_CCACHE == 'true' }}
        run: |
          cd openwrt
          echo "启用ccache，缓存目录：$(pwd)/ccache（持久化缓存）"
          echo "CONFIG_CCACHE=y" >> .config
          echo "CONFIG_CCACHE_DIR=\"$(pwd)/ccache\"" >> .config
          ccache -M 20G
          ccache -z
          make defconfig

      - name: Install extra packages
        if: ${{ github.event.inputs.EXTRA_PACKAGES != '' }}
        run: |
          cd openwrt
          for pkg in ${{ github.event.inputs.EXTRA_PACKAGES }}; do
            ./scripts/feeds install $pkg
            echo "CONFIG_PACKAGE_$pkg=y" >> .config
          done
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          for i in 1 2 3; do
            make download -j$(nproc) V=s && break
            if [ $i -eq 3 ]; then
              echo "::error::软件包下载失败，已重试3次"
              exit 1
            fi
            echo "::warning::软件包下载失败，第${i}次重试，10秒后继续..."
            sleep 10
          done

      - name: Compile firmware
        run: |
          cd openwrt
          echo "开始编译，已开启V=s详细日志"
          make -j$(nproc) V=s || {
            echo "::error::多线程编译失败，尝试单线程重编..."
            make -j1 V=s
            exit $?
          }

      - name: Organize output files
        run: |
          cd openwrt
          mkdir -p ../output/firmware
          OUTPUT_DIR="bin/targets/*/*"
          if [ -d $OUTPUT_DIR ]; then
            # 复制非UBI格式的固件文件，自动排除UBI镜像
            find $OUTPUT_DIR -maxdepth 1 -type f \
              ! -name "*ubi*" \
              \( -name "*-factory.bin" -o -name "*-sysupgrade.bin" \
                 -o -name "*-rootfs.tar.gz" -o -name "sha256sums" \
                 -o -name "*.buildinfo" \) \
              -exec cp -f {} ../output/firmware/ \;
          fi
          echo "固件文件已整理到output目录（已排除UBI格式固件）"
          ls -lh ../output/firmware/

      - name: Clean up old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImmortalWrt ${{ steps.versions.output.IMMORTALWRT_VER }} for ${{ github.event.inputs.DEVICE_ID }}
          tag_name: ${{ steps.versions.output.IMMORTALWRT_VER }}-${{ github.run_number }}
          body: |
            ## 固件信息
            - ImmortalWrt版本: ${{ steps.versions.output.IMMORTALWRT_VER }}
            - 内核版本: ${{ steps.versions.output.KERNEL_VER }}
            - 设备: Nokia XG-040G-MD
            - 编译时间: ${{ github.event.head_commit.timestamp || '手动触发' }}

            ## 网口配置
            - WAN: 第一个2.5G电口(lan1/eth1)，DHCP客户端
            - LAN: lan2/lan3/lan4三个千兆电口，桥接为br-lan，IP 192.168.1.1

            ## 默认信息
            - 管理地址: 192.168.1.1
            - 用户名: root
            - 密码: password
          files: output/firmware/*
          prerelease: false

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: >-
            ImmortalWrt-${{ steps.versions.output.IMMORTALWRT_VER }}-${{ github.event.inputs.DEVICE_ID }}-kernel-${{ steps.versions.output.KERNEL_VER }}
          path: output/firmware/*
          retention-days: 7
          compression-level: 6
