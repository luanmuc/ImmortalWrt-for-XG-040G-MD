name: Build ImmortalWrt for XG-040G-MD

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to debug"
        required: false
        default: false
        type: boolean
      clean_build:
        description: "Clean build directory"
        required: false
        default: false
        type: boolean
      verbose:
        description: "Verbose build log"
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
      - master
  schedule:
    - cron: 0 18 * * *

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  CUSTOM_SCRIPT: scripts/custom.sh
  UPLOAD_RELEASE: true
  UPLOAD_BIN_DIR: false
  TZ_VALUE: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Create swap
      run: |
        sudo fallocate -l 2G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo "/swapfile none swap defaults 0 0" | sudo tee -a /etc/fstab
        free -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
          patch pkgconf python3 python3-pip python3-ply python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
          subversion swig texinfo uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev zstd
        sudo pip3 install --upgrade pip
        sudo pip3 install pygments docutils

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: /mnt/ccache
        key: ccache-xg-040g-md-${{ github.sha }}
        restore-keys: |
          ccache-xg-040g-md-

    - name: Cache downloads
      uses: actions/cache@v4
      with:
        path: /mnt/dl
        key: dl-xg-040g-md-${{ github.sha }}
        restore-keys: |
          dl-xg-040g-md-

    - name: Prepare symlinks for large directories
      run: |
        sudo mkdir -p /mnt/dl /mnt/ccache /mnt/build_dir /mnt/staging_dir
        sudo chown $USER:$USER /mnt/*
        mkdir -p openwrt
        ln -sf /mnt/dl openwrt/dl
        ln -sf /mnt/ccache openwrt/.ccache
        echo "Symlinks created successfully"

    - name: Clone ImmortalWrt source code
      run: |
        git clone --depth 1 --single-branch --branch $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        echo "Source code version:"
        git rev-parse --short HEAD
        git log -1 --format="%s"

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && cp -f $FEEDS_CONF openwrt/feeds.conf.default
        echo "Custom feeds loaded"
        cat openwrt/feeds.conf.default

    - name: Load custom files
      run: |
        [ -d files ] && cp -rf files/* openwrt/
        echo "Custom files loaded"

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a -f

    - name: Load custom script
      run: |
        [ -e $CUSTOM_SCRIPT ] && chmod +x $CUSTOM_SCRIPT && cd openwrt/package && ../../$CUSTOM_SCRIPT
        echo "Custom script executed"

    - name: Load custom configuration
      run: |
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig
        echo "Configuration loaded and defconfig done"

    - name: Download packages
      run: |
        cd openwrt
        make download -j4 V=s
        echo "All packages downloaded"

    - name: Start build
      id: build
      run: |
        cd openwrt
        echo "Build started at: $(date)"
        START_TIME=$(date +%s)
        export CCACHE_DIR=/mnt/ccache
        export CCACHE_MAXSIZE=5G
        export CCACHE_COMPRESS=1
        ccache -z
        if [ "${{ github.event.inputs.verbose }}" = "true" ] || [ "${{ github.event.inputs.verbose }}" = "" ]; then
          make -j$(nproc) V=s || {
            echo "Build failed!"
            echo "==================== Disk usage ===================="
            df -h
            echo "==================== Last 100 lines of log ===================="
            tail -n 100 logs/$(ls -t logs/ | head -1)
            exit 1
          }
        else
          make -j$(nproc) || {
            echo "Build failed!"
            df -h
            tail -n 100 logs/$(ls -t logs/ | head -1)
            exit 1
          }
        fi
        END_TIME=$(date +%s)
        BUILD_TIME=$((END_TIME - START_TIME))
        echo "Build completed at: $(date)"
        echo "Total build time: $((BUILD_TIME/60)) minutes $((BUILD_TIME%60)) seconds"
        ccache -s

    - name: Organize firmware files
      id: organize
      run: |
        cd openwrt/bin/targets/airoha/an7581
        rm -rf *ubi* *UBI*
        DATE=$(date +"%Y.%m.%d-%H%M")
        DEVICE="nokia_xg-040g-md"
        mkdir -p firmware
        for file in *; do
          if [ -f "$file" ]; then
            if echo "$file" | grep -q "sysupgrade"; then
              NEW_NAME="immortalwrt-${DEVICE}-squashfs-sysupgrade-${DATE}.bin"
            elif echo "$file" | grep -q "factory-kernel"; then
              NEW_NAME="immortalwrt-${DEVICE}-squashfs-factory-kernel-${DATE}.bin"
            elif echo "$file" | grep -q "factory-rootfs"; then
              NEW_NAME="immortalwrt-${DEVICE}-squashfs-factory-rootfs-${DATE}.bin"
            elif echo "$file" | grep -q "initramfs"; then
              NEW_NAME="immortalwrt-${DEVICE}-initramfs-${DATE}.itb"
            else
              continue
            fi
            cp "$file" "firmware/$NEW_NAME"
            echo "Generated: $NEW_NAME ($(du -h "$file" | cut -f1))"
          fi
        done
        cp ../../../.config firmware/config-${DATE}.buildinfo
        echo "FIRMWARE_PATH=$(pwd)/firmware" >> $GITHUB_OUTPUT
        echo "BUILD_DATE=$DATE" >> $GITHUB_OUTPUT

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-XG-040G-MD-${{ steps.organize.outputs.BUILD_DATE }}
        path: ${{ steps.organize.outputs.FIRMWARE_PATH }}/*
        retention-days: 7

    - name: Generate Release
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.organize.outputs.BUILD_DATE }}
        name: ImmortalWrt for XG-040G-MD ${{ steps.organize.outputs.BUILD_DATE }}
        body: |
          ## ImmortalWrt for Nokia XG-040G-MD
          - Build date: ${{ steps.organize.outputs.BUILD_DATE }}
          - Source: ImmortalWrt official master branch
          - Kernel: 6.18
          - Default plugins: ttyd, UPnP, SQM, iStore, OFA AppFilter, AdGuard Home, DDNSTO, HomeProxy, Argon Theme, NPU Manager
        files: ${{ steps.organize.outputs.FIRMWARE_PATH }}/*

    - name: Cleanup old releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 20
        delete_tags: true

    - name: Cleanup old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 7
        keep_minimum_runs: 10