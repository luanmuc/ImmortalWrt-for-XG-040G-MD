name: Build ImmortalWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  CUSTOM_SCRIPT: scripts/custom.sh
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Create 2G swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 2

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get -y update
        sudo apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
          patch python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: Create large directory symlinks
      run: |
        cd $OPENWRT_PATH
        sudo mkdir -p /mnt/openwrt
        for dir in build_dir dl staging_dir tmp; do
          sudo mkdir -p /mnt/openwrt/"$dir"
          if [ -d "$dir" ] && [ "$(ls -A "$dir")" ]; then
            sudo cp -a "$dir"/* /mnt/openwrt/"$dir"/ 2>/dev/null || true
            sudo rm -rf "$dir"
          fi
          sudo ln -sf /mnt/openwrt/"$dir" "$dir"
        done
        sudo chown -R runner:runner /mnt/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $CUSTOM_SCRIPT
        cd openwrt
        $GITHUB_WORKSPACE/$CUSTOM_SCRIPT

    - name: Update and install feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files $OPENWRT_PATH/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig

    - name: Download packages
      uses: nick-fields/retry@v3
      with:
        max_attempts: 3
        retry_wait_seconds: 10
        timeout_minutes: 30
        command: |
          cd $OPENWRT_PATH
          make download -j$(nproc)

    - name: Ccache cache
      uses: actions/cache@v3
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-immortalwrt-${{ github.sha }}
        restore-keys: |
          ccache-immortalwrt-

    - name: Compile firmware
      uses: nick-fields/retry@v3
      with:
        max_attempts: 3
        retry_wait_seconds: 30
        timeout_minutes: 180
        command: |
          cd $OPENWRT_PATH
          echo "start compile"
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export CCACHE_COMPILERCHECK=content
          ccache -M 2G
          make -j$(nproc) || make -j1 V=s

    - name: Organize files
      id: organize
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "tag_name=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "file_date=$(date +"%Y.%m.%d")" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      with:
        name: ImmortalWrt-firmware-${{ steps.organize.outputs.file_date }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Generate release tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=ImmortalWrt_${{ steps.organize.outputs.tag_name }}" >> $GITHUB_ENV
        touch release.txt
        echo " ImmortalWrt firmware build " >> release.txt
        echo " Build date: $(date +"%Y-%m-%d %H:%M:%S")" >> release.txt
        echo " Default IP: 192.168.1.1" >> release.txt
        echo " Default user: root" >> release.txt
        echo " Default password: password" >> release.txt

    - name: Publish release
      uses: softprops/action-gh-release@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        tag_name: ${{ env.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_PATH }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
