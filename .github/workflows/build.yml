name: Build ImmortalWrt for XG-040G-MD
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  CUSTOM_SCRIPT: scripts/custom.sh
  UPLOAD_RELEASE: true
  CCACHE_DIR: /mnt/immortalwrt/ccache
  CCACHE_MAXSIZE: 2G
  TZ: Asia/Shanghai
jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
    - name: Checkout
      uses: actions/checkout@main
    - name: Free up disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Check disk space
      run: df -h
    - name: Create 4G swap
      run: |
        sudo swapoff /swapfile 2>/dev/null
        sudo rm -f /swapfile
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
    - name: Install build dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -y update
        sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-setuptools python3-pyelftools python3-dev \
          rsync swig unzip zlib1g-dev file wget device-tree-compiler ccache p7zip-full quilt xsltproc \
          libfdt-dev libgmp3-dev libmpc-dev libmpfr-dev
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
    - name: Clone ImmortalWrt source
      run: |
        git clone --branch "$REPO_BRANCH" "$REPO_URL" openwrt
        echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV
    - name: Move large directories to /mnt
      run: |
        sudo mkdir -p /mnt/immortalwrt/{dl,staging_dir,build_dir,ccache}
        sudo chown -R "$USER:$(id -gn)" /mnt/immortalwrt
        cd "$OPENWRT_PATH"
        rm -rf dl staging_dir build_dir ccache
        ln -sfn /mnt/immortalwrt/dl dl
        ln -sfn /mnt/immortalwrt/staging_dir staging_dir
        ln -sfn /mnt/immortalwrt/build_dir build_dir
        ln -sfn /mnt/immortalwrt/ccache ccache
    - name: Cache dl directory
      uses: actions/cache@v3
      with:
        path: /mnt/immortalwrt/dl
        key: ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-dl
        restore-keys: |
          ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-dl-
    - name: Cache ccache directory
      uses: actions/cache@v3
      with:
        path: /mnt/immortalwrt/ccache
        key: ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-ccache
        restore-keys: |
          ${{ runner.os }}-immortalwrt-${{ env.REPO_BRANCH }}-ccache-
    - name: Setup ccache
      run: |
        mkdir -p "$CCACHE_DIR"
        ccache -M "$CCACHE_MAXSIZE"
        ccache -s
    - name: Copy custom files
      run: |
        [ -e "$FEEDS_CONF" ] && cp -f "$FEEDS_CONF" "$OPENWRT_PATH/feeds.conf.default"
        [ -e files ] && cp -af files "$OPENWRT_PATH/"
        [ -e "$CONFIG_FILE" ] && cp -f "$CONFIG_FILE" "$OPENWRT_PATH/.config"
    - name: Update feeds
      working-directory: ${{ env.OPENWRT_PATH }}
      run: |
        for i in 1 2 3; do
          ./scripts/feeds update -a && break
          sleep 10
        done
        ./scripts/feeds install -a -f
    - name: Run custom script
      run: |
        chmod +x "$GITHUB_WORKSPACE/$CUSTOM_SCRIPT"
        cd "$OPENWRT_PATH"
        "$GITHUB_WORKSPACE/$CUSTOM_SCRIPT"
    - name: Generate default config
      working-directory: ${{ env.OPENWRT_PATH }}
      run: |
        make defconfig
    - name: Download packages
      working-directory: ${{ env.OPENWRT_PATH }}
      run: |
        for i in 1 2 3; do
          make download -j$(nproc) V=s && break
          sleep 10
        done
        find dl -size -1024c -delete
    - name: Compile firmware
      working-directory: ${{ env.OPENWRT_PATH }}
      run: |
        echo "Disk usage before compile:"
        df -h
        make -j$(nproc) V=s || {
          echo "Compile failed, disk usage:"
          df -h
          du -h -d1 . | sort -h | tail -30
          exit 1
        }
        echo "ccache stats after compile:"
        ccache -s || true
    - name: Organize firmware files
      id: organize
      run: |
        cd "$OPENWRT_PATH/bin/targets/airoha/an7581"
        rm -rf packages
        rm -f *ubi*
        ls | grep -vE "(sysupgrade\.bin|factory\.bin|sha256sums)" | xargs rm -f
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "tag_name=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "file_date=$(date +"%Y.%m.%d")" >> $GITHUB_OUTPUT
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@main
      with:
        name: ImmortalWrt-XG-040G-MD-${{ steps.organize.outputs.file_date }}
        path: ${{ env.FIRMWARE_PATH }}
    - name: Cleanup old releases
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        gh release list --limit 10 | awk '{print $1}' | xargs -I {} gh release delete {} -y || true
    - name: Generate release notes
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=ImmortalWrt_${{ steps.organize.outputs.tag_name }}" >> $GITHUB_ENV
        cat > release.txt <<EOF
ImmortalWrt firmware for Nokia XG-040G-MD
----------------------
Device: Nokia XG-040G-MD (Airoha AN7581)
Build date: $(date +"%Y-%m-%d %H:%M:%S")
Kernel: 6.18.x (ImmortalWrt master)
Default IP: 192.168.1.1
Default user: root
Default password: password
EOF
    - name: Publish to Release
      uses: softprops/action-gh-release@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        tag_name: ${{ env.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_PATH }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
